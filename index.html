<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Odvoz odpadu</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      background: white;
      padding: 20px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    .sub {
      color: #555;
      margin-bottom: 20px;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .benefits {
      text-align: left;
      margin-bottom: 20px;
    }

    .benefits p {
      margin: 6px 0;
    }

    .box {
      background: #f0f0f0;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 14px;
      width: 100%;
      background: #ffcc00;
      color: black;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    #successMessage {
      display: none;
      margin-top: 15px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- REKLAMNÝ OBRÁZOK -->
  <img src="/photos/odvoz-odpadu.png" alt="Odvoz odpadu">

  <!-- HLAVNÝ TEXT -->
  <h1>Odvoz odpadu bez čakania</h1>

  <p class="sub">
    Prídeme, naložíme a odvezieme. Jednoducho a bez starostí.
  </p>

  <!-- BENEFITY -->
  <div class="benefits">
    <p>✔ Príchod do 24 hodín</p>
    <p>✔ Všetko naložíme za vás</p>
    <p>✔ Férová cena bez skrytých poplatkov</p>
  </div>

  <!-- INFO BOX -->
  <div class="box">
    Stačí pár údajov a ozveme sa vám s detailmi a cenou.
  </div>

  <!-- FORM -->
  <form
    id="leadForm"
    action="https://script.google.com/macros/s/AKfycbxWV1H_jrzOhlII5v0KwxNZpZth2pzHwOXolkQ6ImogRrNQstxIjwHtMFNZoQtVeGc/exec"
    method="POST"
    target="hidden_iframe"
  >
    <input type="text" name="name" placeholder="Vaše meno">
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" placeholder="Čo potrebujete odviezť?"></textarea>

    <input type="hidden" name="slug" value="odvoz-odpadu">
    <input type="hidden" name="page_url" id="page_url">
    <input type="hidden" name="user_agent" id="user_agent">

    <button type="submit">ZISTIŤ CENU A TERMÍN</button>
  </form>

  <iframe name="hidden_iframe" style="display:none;"></iframe>

  <p id="successMessage">
    Ďakujeme, ozveme sa vám čo najskôr.
  </p>

</div>

<script>
  document.getElementById('page_url').value = window.location.href;
  document.getElementById('user_agent').value = navigator.userAgent;

  const form = document.getElementById('leadForm');
  const successMessage = document.getElementById('successMessage');

  form.addEventListener('submit', function () {
    setTimeout(function () {
      form.reset();
      successMessage.style.display = 'block';
    }, 800);
  });
</script>

</body>
</html>
